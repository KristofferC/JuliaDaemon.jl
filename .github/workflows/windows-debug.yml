# Temporary fast-iteration workflow while stabilizing Windows support.
name: windows-debug
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: windows-latest
    timeout-minutes: 28
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Full e2e with trace
        timeout-minutes: 25
        env:
          JLD_DEBUG: '1'
          JLD_E2E_TRACE: '1'
        run: test/e2e.sh
