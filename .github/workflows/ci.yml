name: CI
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: julia ${{ matrix.version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    # Nightly is informational: its JIT/stdlib churn should not gate CI.
    continue-on-error: ${{ matrix.version == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.12', 'pre']
        os: [ubuntu-latest, macos-latest]
        include:
          - version: 'nightly'
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - name: End-to-end tests
        run: test/e2e.sh
